name: Publish Container Image

on:
  pull_request:
    branches:
      - 'release/**'
    types:
      - closed
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Additional container tag to publish together with production and sha-*'
        required: false
        default: manual

concurrency:
  group: publish-container-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_TAG: production

jobs:
  publish:
    name: Build And Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: image-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            raw_tag="${{ github.event.pull_request.base.ref }}"
          else
            raw_tag="${{ inputs.image_tag }}"
          fi

          tag="${raw_tag//\//-}"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
          tag="${tag//[^a-z0-9_.-]/-}"

          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ steps.image-tag.outputs.value }}
            type=raw,value=${{ env.DEPLOY_TAG }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_WEBHOOK" ]; then
            echo "DOKPLOY_DEPLOY_WEBHOOK secret is not configured."
            exit 1
          fi

          curl -fsSL -X POST "$DOKPLOY_DEPLOY_WEBHOOK"
