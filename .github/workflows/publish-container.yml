name: Publish Container Image

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_TAG: production

jobs:
  publish:
    name: Build And Publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate production source
        shell: bash
        run: |
          git fetch origin main --depth=1

          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main$'; then
            echo "Production releases are only allowed from commits that exist on origin/main."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release tag
        id: release-tag
        shell: bash
        run: |
          raw_tag="${{ github.ref_name }}"

          tag="${raw_tag//\//-}"
          tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]')"
          tag="${tag//[^a-z0-9_.-]/-}"

          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ steps.release-tag.outputs.value }}
            type=raw,value=${{ env.DEPLOY_TAG }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_WEBHOOK" ]; then
            echo "DOKPLOY_DEPLOY_WEBHOOK secret is not configured."
            exit 1
          fi

          curl -fsSL -X POST "$DOKPLOY_DEPLOY_WEBHOOK"
